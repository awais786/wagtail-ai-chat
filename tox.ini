[tox]
envlist = py{311,312}-django{42,52}
skipsdist = False

[testenv]
deps =
    pytest>=7.0.0
    pytest-django>=4.5.0
    pytest-cov>=4.0.0
    django42: Django>=4.2,<5.0
    django52: Django>=5.2,<6.0
    wagtail>=6.0
    -e .[test,local]
setenv =
    DJANGO_SETTINGS_MODULE = wagtail_rag.tests.settings
commands =
    pytest {posargs:wagtail_rag/tests}

[testenv:coverage]
deps = {[testenv]deps}
setenv = {[testenv]setenv}
commands =
    pytest --cov=wagtail_rag --cov-report=html --cov-report=term-missing {posargs:wagtail_rag/tests}

[testenv:lint]
deps =
    black
    flake8
commands =
    black --check wagtail_rag
    flake8 wagtail_rag --count --select=E9,F63,F7,F82 --show-source --statistics
    flake8 wagtail_rag --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
